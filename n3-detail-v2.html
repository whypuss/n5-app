<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 句子</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        
        .header { background: #fff; padding: 16px; border-bottom: 1px solid #e0e0e0; text-align: center; }
        .header a { color: #8e44ad; text-decoration: none; font-size: 14px; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; }
        .nav-btn { padding: 10px 20px; background: #8e44ad; color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; text-decoration: none; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .sentence-card { background: #fff; border-radius: 12px; padding: 24px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 800px; margin-left: auto; margin-right: auto; margin-bottom: 100px; }
        
        .sentence-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #8e44ad; }
        .sentence-id { font-size: 16px; font-weight: bold; color: #333; }
        .sentence-category { font-size: 14px; color: #8e44ad; background: #f5eef7; padding: 4px 12px; border-radius: 4px; font-weight: 600; }
        
        .japanese-main { text-align: center; font-size: 28px; color: #333; font-weight: bold; margin-bottom: 20px; }
        
        .japanese-section { background: #fff; border: 2px solid #8e44ad; border-radius: 8px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
        
        .vert-container { display: flex; justify-content: center; min-width: max-content; }
        .vert-col { display: flex; flex-direction: column; align-items: center; min-width: 40px; padding: 0 4px; }
        .vert-kanji { font-size: 22px; font-weight: bold; color: #333; }
        .vert-hira { font-size: 14px; color: #666; line-height: 1.4; }
        .vert-ro { font-size: 12px; color: #999; font-style: italic; line-height: 1.4; }
        
        .grammar-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 2px solid #8e44ad; }
        .grammar-table th { background: #8e44ad; color: #fff; padding: 10px; text-align: left; }
        .grammar-table td { border: 1px solid #ddd; padding: 10px; background: #fafafa; }
        .word-col { font-weight: bold; color: #333; }
        .mean-col { color: #8e44ad; }
        .pos-col { color: #666; font-size: 12px; }
        .note-col { color: #888; font-size: 12px; font-style: italic; }
        
        .translation { margin-top: 16px; padding: 16px; background: #f5eef7; border-radius: 8px; text-align: center; border-left: 4px solid #8e44ad; }
        .translation-text { font-size: 18px; color: #333; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <a href="n3-list-v2.html">← 返回列表</a>
    </div>
    
    <div id="content">
        <div style="text-align:center; padding: 40px;">載入中...</div>
    </div>
    
    <div class="nav-bar" style="position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e0e0e0;">
        <button id="prevBtn" class="nav-btn" onclick="changePage(-1)">← 上一句</button>
        <span id="pageNum"></span>
        <button id="nextBtn" class="nav-btn" onclick="changePage(1)">下一句 →</button>
    </div>
    
    <script>
        let sentences = [];
        let currentIndex = 0;
        
        fetch('./n3-v2-data.json')
            .then(r => r.json())
            .then(data => {
                sentences = data.sentences;
                initFromURL();
            });
        
        function initFromURL() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                currentIndex = parseInt(id);
            }
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= sentences.length) currentIndex = sentences.length - 1;
            render();
        }
        
        function changePage(delta) {
            currentIndex += delta;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= sentences.length) currentIndex = sentences.length - 1;
            render();
            window.scrollTo(0, 0);
        }
        
        function render() {
            const s = sentences[currentIndex];
            if (!s) return;
            
            document.getElementById('pageNum').textContent = `${currentIndex + 1} / ${sentences.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === sentences.length - 1;
            
            let vertHtml = '<div class="vert-container">';
            (s.sequence || []).forEach(item => {
                const kanji = item[0] || '';
                const hira = item[1] || '';
                const ro = item[2] || '';
                
                const hiraChars = hira.split('');
                const roParts = ro.split(' ');
                
                vertHtml += `<div class="vert-col">`;
                
                if (kanji && kanji !== '。' && kanji !== '、' && kanji !== '？' && kanji !== '！') {
                    vertHtml += `<div class="vert-kanji">${kanji}</div>`;
                } else if (kanji === '。') {
                    vertHtml += `<div class="vert-kanji" style="color:#999;">。</div>`;
                } else {
                    vertHtml += `<div class="vert-kanji">　</div>`;
                }
                
                if (hiraChars.length > 0 && hiraChars[0]) {
                    hiraChars.forEach(h => {
                        vertHtml += `<div class="vert-hira">${h}</div>`;
                    });
                }
                
                if (roParts.length > 0 && roParts[0]) {
                    roParts.forEach(r => {
                        vertHtml += `<div class="vert-ro">${r}</div>`;
                    });
                }
                
                vertHtml += `</div>`;
            });
            vertHtml += '</div>';
            
            let tableHtml = '<table class="grammar-table"><tr><th>單字</th><th>意思</th><th>詞性</th><th>說明</th></tr>';
            (s.explanation || []).forEach(exp => {
                tableHtml += `<tr>
                    <td class="word-col">${exp.word || ''}</td>
                    <td class="mean-col">${exp.mean || '-'}</td>
                    <td class="pos-col">${exp.pos || '-'}</td>
                    <td class="note-col">${exp.note || '-'}</td>
                </tr>`;
            });
            tableHtml += '</table>';
            
            // Get translation from dedicated field, fallback to explanation
            const mainTranslation = s.translation || 
                ((s.explanation || [])[0]?.mean || '');
            
            const html = `
            <div class="sentence-card">
                <div class="sentence-header">
                    <span class="sentence-id">${s.id}</span>
                    <span class="sentence-category">${s.category || ''} | ${s.tense || ''}</span>
                </div>
                
                <div class="japanese-main">${(s.sequence || []).map(p => p[0]).join('')}</div>
                
                <div class="japanese-section">
                    ${vertHtml}
                </div>
                
                ${tableHtml}
                
                <div class="translation">
                    <div class="translation-text">${mainTranslation}</div>
                </div>
            </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
    </script>
</body>
</html>
